[tool.ruff]
target-version = "py310"
# 启用核心规则集
line-length = 120
lint.select = ["E", "F", "W", "I", "N", "ANN"] # ANN为类型注解规则，N强制执行PEP8命名规范，I自动排序import语句
lint.ignore = [
    "E501",   # 行太长（由line-length=120控制，不强制）
    "D100",   # 模块缺docstring（jupytext的markdown cell已说明用途）
    "D103",   # 公开函数缺docstring（同上）
    "D203",   # 类docstring前无空行（与D211互斥，保留D211）
    "D213",   # 多行docstring摘要另起一行（与D212互斥，保留D212）
    "D400",   # docstring首行不以句号结尾（中文文档不适用）
    "D413",   # docstring末行无空行（过于严格）
    "D415",   # docstring首行不以标点结尾（中文文档不适用）
    "ANN001", # 函数参数缺类型注解（历史代码量大，暂忽略）
    "ANN201", # 公开函数缺返回类型注解（同上）
    "ANN202", # 私有函数缺返回类型注解（同上）
]
extend-include = ["*.ipynb"]
lint.extend-select = ["D"]

# [tool.ruff.lint]
# 启用文档字符串规则
# 强制要求公共函数有类型注解
# require-annotations = true
# 自动修复缺失的类型注解
# annotate-missing = true
# 要求公共函数有docstring
# require-docstrings = true
# 自动修复缺失的docstring模板
# docstring-convetion = "google"

[tool.ruff.format]
indent-style = "space"

[tool.ruff.lint.isort]
# 按类型分组排序import
# profile = "black"

[tool.jupytext]
notebook_metadata_filter = "jupytext,-kernelspec,-jupytext.text_representation.jupytext_version"
cell_metadata_filter="-all"
outdated_text_notebook_margin = 5
